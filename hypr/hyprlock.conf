# --- Hyprlock Config ---

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /path/to/your/background.jpg
    color = rgba(11, 11, 11, 1.0)
    blur_passes = 2 # 0 disables blurring
    blur_size = 7
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(D30000)
    inner_color = rgb(11, 11, 11)
    font_color = rgb(F2F2F2)
    fade_on_empty = true
    placeholder_text = <span foreground="##F2F2F2">bruh</span>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(F2F2F2)
    font_size = 64
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}